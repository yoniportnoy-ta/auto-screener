<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Auto Screener — Settings</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #9671ff;
      --border: #2d3a4d;
      --ok: #4ade80;
      --bad: #fca5a5;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      line-height: 1.4;
      padding: 0.85rem;
    }
    h1 {
      margin: 0 0 0.6rem;
      font-size: 14px;
      font-weight: 600;
      color: #c9b8ff;
      letter-spacing: 0.02em;
    }
    .hint {
      font-size: 11.5px;
      color: var(--muted);
      margin-bottom: 0.7rem;
    }
    label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0.6rem 0 0.25rem;
      font-weight: 600;
    }
    input[type="text"], input[type="password"], input[type="email"] {
      width: 100%;
      padding: 0.45rem 0.55rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font: inherit;
      font-size: 12.5px;
    }
    input:focus { outline: none; border-color: var(--accent); }
    .row { display: flex; gap: 0.4rem; align-items: center; margin-top: 0.85rem; }
    button {
      background: var(--accent);
      color: #fff;
      border: 1px solid rgba(150, 113, 255, 0.92);
      padding: 0.45rem 0.85rem;
      border-radius: 6px;
      font: inherit;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
    }
    button.ghost {
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
    }
    .status {
      font-size: 11.5px;
      margin-left: auto;
      color: var(--muted);
    }
    .status.ok  { color: var(--ok); }
    .status.err { color: var(--bad); }
    .footer {
      margin-top: 0.85rem;
      padding-top: 0.6rem;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
    }
    .footer a { color: #c9b8ff; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .linklike {
      background: transparent; border: none; color: var(--muted);
      padding: 0; font: inherit; font-size: 11px; cursor: pointer;
    }
    .linklike:hover { color: var(--text); }
  </style>
</head>
<body>
  <h1>Auto Screener</h1>
  <div class="hint" id="hint">Open any Comeet candidate page to see the panel.</div>

  <div class="row" style="margin-top:0.4rem;">
    <button id="test" type="button">Test connection</button>
    <span id="status" class="status"></span>
  </div>

  <div class="footer">
    <button id="btnAdvanced" type="button" class="linklike">Advanced ▾</button>
  </div>

  <div id="advanced" style="display:none; margin-top:0.5rem; padding-top:0.5rem; border-top:1px solid var(--border);">
    <label for="backend">Backend URL</label>
    <input id="backend" type="text" autocomplete="off" />

    <label for="token">API token</label>
    <input id="token" type="password" autocomplete="off" />

    <div class="row">
      <button id="save" type="button">Save</button>
    </div>
  </div>

  <script src="embedded-config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
